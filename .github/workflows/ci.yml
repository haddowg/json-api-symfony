name: CI

on:
  push:
    branches: [main]
  pull_request:

# No workflow-level permissions; each job requests only what it needs.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Steps run inside the bundle checkout; the sibling core checkout resolves the
# `../json-api` Composer path repository until core is published to Packagist.
defaults:
  run:
    working-directory: json-api-symfony

jobs:
  tests:
    name: "Tests (PHP ${{ matrix.php }}, ${{ matrix.dependencies }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        dependencies: [lowest, highest]
    steps:
      - name: Checkout bundle
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: json-api-symfony
          persist-credentials: false

      - name: Checkout core (haddowg/json-api)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: haddowg/json-api
          path: json-api
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
        with:
          dependency-versions: ${{ matrix.dependencies }}
          working-directory: json-api-symfony

      - name: Run tests
        run: composer test

  phpstan:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout bundle
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: json-api-symfony
          persist-credentials: false

      - name: Checkout core (haddowg/json-api)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: haddowg/json-api
          path: json-api
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
        with:
          working-directory: json-api-symfony

      - name: Run PHPStan
        run: composer phpstan

  coding-standards:
    name: Coding standards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout bundle
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: json-api-symfony
          persist-credentials: false

      - name: Checkout core (haddowg/json-api)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: haddowg/json-api
          path: json-api
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
        with:
          working-directory: json-api-symfony

      - name: Check coding standards
        run: composer cs-check
