# The route imports that mount the JSON:API endpoints. The bundle's custom route
# loader (`type: jsonapi`) emits one literal route per type/operation from the
# compiled resource descriptors — the `resource:` argument names the SERVER, not a
# path/glob (ADR 0034).
#
# The bare `.` import emits the `default` server's routes (unprefixed names
# `jsonapi.{type}.{action}`). The `admin` import emits the named `admin` server's
# routes (namespaced names `jsonapi.admin.{type}.{action}`) under the `/admin`
# prefix — exactly where a Symfony user expects prefix/host to live.
json_api_default:
    resource: '.'
    type: jsonapi

json_api_admin:
    resource: admin
    type: jsonapi
    prefix: /admin

# The OpenAPI document + viewer routes (one import, all servers). In per-server mode
# this emits GET /docs.json (the default server's document), GET /{server}/docs.json
# (the admin server's document) and GET /docs (the Swagger UI viewer). All ride the
# expose gate (kernel.debug OR openapi.expose_in_prod), which the example opts into.
json_api_openapi:
    resource: .
    type: jsonapi_openapi
