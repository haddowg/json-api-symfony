# The bundle configuration tree (declared inline in AbstractBundle::configure();
# there is no Configuration.php). The top-level base_uri/version define the
# implicit `default` server, so a single-API app needs no `servers:` block.
#
# This example declares a second, named `admin` server (ADR 0034) — the minimal
# multi-server witness. It carries its own base_uri and inherits the top-level
# version (omitted here). Types join a server via the resource attribute's
# `server:` argument (AlbumResource on both; UserResource admin-only), and each
# server's routes mount via a per-server import in routes/json_api.yaml.
json_api:
    base_uri: 'https://music.example'
    version: '1.1'
    # Include safeguard B (bundle ADR 0037): cap the nesting depth of a `?include`
    # (relationship hops from the primary resource). The bundle default is 3; set
    # to 2 here so the cap is witnessable — `?include=tracks.album` (depth 2) is
    # allowed, but a depth-3 path is a 400. `0` would be unlimited. A resource's own
    # maxIncludeDepth() overrides this server default per type. With safeguard A
    # (the `albums` back-reference opted out on the artist) and safeguard C (the
    # user allow-list below), this also guarantees `?include` always terminates.
    max_include_depth: 2
    # The server default paginator caps a client's page[size]/page[limit] at this
    # value, closing a page-size DoS (see core docs/pagination.md). Set explicitly
    # to 50 here to witness the clamp; omit the key for core's default of 100, or
    # set 0 to disable the cap. A resource's own pagination() sets its own cap via
    # withMaxPerPage().
    pagination:
        max_per_page: 50
    # Reject an unrecognized top-level query-parameter family with a 400 (bundle ADR
    # 0055) rather than silently dropping it — so a client typo (?bogus, a misspelled
    # ?pag[number]) surfaces as an error instead of a wrong-but-200 result. This is the
    # DEFAULT (true), so the key is omitted here and strict validation is already on;
    # set it to false to restore the pre-strict silent-ignore behaviour. withCount and a
    # negotiated relatedQuery/rQ family stay recognized automatically. See
    # tests/StrictQueryParametersTest.php and tests/RelaxedQueryParametersTest.php.
    # strict_query_parameters: true
    servers:
        admin:
            base_uri: 'https://admin.music.example'
